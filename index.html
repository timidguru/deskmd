<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>DeskMD</title>
    <link rel="stylesheet" href="./styles.css">
    <script src="./vendor/versions.js" defer></script>
    <script src="./vendor/purify.min.js" defer></script>
    <script src="./vendor/marked.umd.js" defer></script>
    <script src="./app.js" defer></script>
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div class="document-strip">
          <div class="app-mark" aria-hidden="true">MD</div>
          <div class="document-meta">
            <div class="app-line">
              <span class="app-name">DeskMD</span>
              <span id="appVersion" class="version-badge">v1.0.1</span>
              <span id="updateStatus" class="update-status">Checking renderer updates...</span>
            </div>
            <h1 id="documentName" class="document-name">document.md</h1>
            <p id="status" class="document-status">자동 저장 준비됨</p>
          </div>
        </div>

        <nav class="actions" aria-label="Document actions">
          <div class="action-group" aria-label="Document">
            <button type="button" id="newDoc">New</button>
            <button type="button" id="openFileButton">Open</button>
            <input type="file" id="openFile" accept=".md,.markdown,.txt,text/markdown,text/plain">
          </div>
          <div class="action-group" aria-label="Save">
            <button type="button" id="saveMd" class="primary-action">Save</button>
            <button type="button" id="saveAs">Save As</button>
          </div>
        </nav>
      </header>

      <section class="workspace" aria-label="Markdown editor">
        <div class="pane editor-pane">
          <div class="pane-head">
            <span>Editor</span>
            <span id="count">0자</span>
          </div>
          <textarea
            id="editor"
            spellcheck="false"
            aria-label="Markdown input"
          ></textarea>
        </div>

        <div class="pane preview-pane">
          <div class="pane-head">
            <span>Preview</span>
            <span>⌘S Save</span>
          </div>
          <article id="preview" class="preview" aria-live="polite"></article>
        </div>
      </section>
    </main>
  </body>
</html>
