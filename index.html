<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>DeskMD</title>
    <link rel="stylesheet" href="./styles.css">
    <script src="./vendor/versions.js" defer></script>
    <script src="./vendor/purify.min.js" defer></script>
    <script src="./vendor/marked.umd.js" defer></script>
    <script src="./app.js" defer></script>
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div class="brand">
          <img
            src="https://images.unsplash.com/photo-1455390582262-044cdead277a?auto=format&fit=crop&w=160&q=70"
            alt=""
            class="brand-image"
          >
          <div>
            <div class="title-row">
              <h1>DeskMD</h1>
              <span id="appVersion" class="version-badge">v1.0.1</span>
            </div>
            <p id="documentName" class="document-name">document.md</p>
            <p id="status">자동 저장 준비됨</p>
            <p id="updateStatus" class="update-status">Checking renderer updates...</p>
          </div>
        </div>

        <div class="actions" aria-label="Document actions">
          <button type="button" id="newDoc">New</button>
          <button type="button" id="openFileButton">Open</button>
          <input type="file" id="openFile" accept=".md,.markdown,.txt,text/markdown,text/plain">
          <button type="button" id="saveMd">Save</button>
          <button type="button" id="saveAs">Save As</button>
        </div>
      </header>

      <section class="workspace" aria-label="Markdown editor">
        <div class="pane editor-pane">
          <div class="pane-head">
            <span>Editor</span>
            <span id="count">0자</span>
          </div>
          <textarea
            id="editor"
            spellcheck="false"
            aria-label="Markdown input"
          ></textarea>
        </div>

        <div class="pane preview-pane">
          <div class="pane-head">
            <span>Preview</span>
            <span>⌘S Save</span>
          </div>
          <article id="preview" class="preview" aria-live="polite"></article>
        </div>
      </section>
    </main>
  </body>
</html>
